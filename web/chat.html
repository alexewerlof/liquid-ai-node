<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
</head>

<body>
    <section id="chat-section" hidden>
        <textarea id="prompt" placeholder="Enter your prompt here...">What is SRE?</textarea>
        <br>
        <button id="submit-prompt" type="button">Submit</button>
        <button id="stop-prompt" type="button">Stop</button>
    </section>
    <button id="init-chat" type="button">Init Chat</button>
    <section id="chat-progress"></section>

    <script type="importmap">
        {
            "imports": {
                "jty": "../dependencies/jty.js",
                "jj": "../dependencies/jj.js",
                "@huggingface/transformers": "../dependencies/@huggingface/transformers.js"
            }
        }
    </script>
    <script type="module" src="chat.js"></script>
</body>

</html>
